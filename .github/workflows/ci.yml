name: CI

on:
  push:
    branches: [ main, develop, 'v*' , test ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync

    # Avoid using make ci-check to get better feedback on the errors
    - name: Run ruff check
      run: uv run ruff check . --output-format=github

    - name: Run ruff format check
      run: uv run ruff format --check

    - name: Run pyrefly check
      run: uv run pyrefly check

    - name: Run pip-audit
      run: uv tool run pip-audit

    - name: Run pytest
      run: uv run pytest -m "not eval"

    - name: Check generated docs are up-to-date
      run: |
        make generate-docs
        git diff --exit-code docs/ || (echo "Generated docs are out of date. Run 'make generate-docs' and commit the changes." && exit 1)

  build-container:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: x2a-convertor:latest

  trigger-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    needs: [lint-and-format, build-container]

    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.AAP_ID }}
        private-key: ${{ secrets.AAP_PRIVATE_KEY }}
        owner: x2ansible
        repositories: x2ansible

    - name: Trigger docs workflow
      run: gh workflow run docs --repo x2ansible/x2ansible
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
