---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: x2a-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: x2a-role
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "delete", "put"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: x2a-rolebinding
subjects:
  - kind: ServiceAccount
    name: x2a-sa
roleRef:
  kind: Role
  name: x2a-role
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole/ClusterRoleBinding for x2a-sa to pass the plugin's connection test
# which hardcodes a pod list call against the 'default' namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: x2a-cluster-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: x2a-cluster-rolebinding
subjects:
  - kind: ServiceAccount
    name: x2a-sa
    namespace: x2ansible
roleRef:
  kind: ClusterRole
  name: x2a-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
# X2A Backstage Plugin Application Resources
# Apply to any namespace using: oc apply -n <your-namespace> -f app.yaml
#
# ConfigMap: Dynamic Plugins Configuration
kind: ConfigMap
apiVersion: v1
metadata:
  name: dynamic-plugins
  # namespace field intentionally omitted - use -n flag when applying
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      # X2A Plugins for RHDH 1.9
      # The x2a did not make it overlays' branching out release-1.9, so there is the PR 2063 workaround.
      # The 1.10+ should be tagged normally
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-x2a:pr_2071__1.1.1"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-x2a-backend:pr_2071__1.2.0"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-scaffolder-backend-module-x2a:pr_2071__0.2.0"
---
# ConfigMap: Application Configuration
kind: ConfigMap
apiVersion: v1
metadata:
  name: app-config-rhdh
data:
  app-config-rhdh.yaml: |

    backend:
      reading:
        allow:
          - host: raw.githubusercontent.com

    integrations:
      github:
      - host: github.com

    auth:
      # see https://backstage.io/docs/auth/ to learn about auth providers
      environment: development
      providers:
        # See https://backstage.io/docs/auth/guest/provider
        guest: {}

        github:
          development:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true

    dynamicPlugins:
      frontend:
        red-hat-developer-hub.backstage-plugin-x2a:
          scaffolderFieldExtensions:
            - importName: RepoAuthenticationExtension
          appIcons:
            - name: x2aIcon
              importName: X2AIcon
          dynamicRoutes:
            - path: /x2a/
              importName: X2APage
              menuItem:
                text: Conversion Hub
                icon: x2aIcon

    catalog:
      locations:
        # x2a Create Project template
        - type: file
          target: /opt/app-root/src/dynamic-plugins-root/red-hat-developer-hub-backstage-plugin-scaffolder-backend-module-x2a/templates/conversion-project-template.yaml
          rules:
            - allow: [Template]
    x2a:
      callbackBaseUrl: http://${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local/api/x2a
      kubernetes:
        image: ${X2A_KUBERNETES_IMAGE:-quay.io/x2ansible/x2a-convertor}
        imageTag: ${X2A_KUBERNETES_IMAGE_TAG:-latest}
        ttlSecondsAfterFinished: 86400
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
      credentials:
        llm:
          LLM_MODEL: ${LLM_MODEL:-anthropic.claude-v2}
          # Example for AWS Bedrock with bearer token:
          AWS_REGION: ${AWS_REGION}
          AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK}
        aap:
          url: ${AAP_URL:-https://aap.example.com}
          orgName: ${AAP_ORG_NAME:-MyOrganization}
          oauthToken: ${AAP_OAUTH_TOKEN:-your-oauth-token}
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: dynamic-plugins-root
spec:
  accessModes:
    - ReadWriteOnce
  # CUSTOMIZATION: Change storage class for your environment
  # Common values:
  #   - OpenShift CRC: crc-csi-hostpath-provisioner
  #   - AWS EBS: gp2 or gp3
  #   - Azure: managed-premium
  #   - GCP: standard or standard-rwo
  # List available storage classes: oc get storageclass
  # storageClassName: kubevirt-csi-infra-default
  storageClassName: crc-csi-hostpath-provisioner
  resources:
    requests:
      storage: 2Gi
---
apiVersion: rhdh.redhat.com/v1alpha4
kind: Backstage
metadata:
  name: developer-hub
spec:
  deployment:
    patch:
      spec:
        template:
          spec:
            serviceAccountName: x2a-sa
            automountServiceAccountToken: true
            containers:
              - name: backstage-backend
                env:
                  - name: NODE_EXTRA_CA_CERTS
                    value: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  - name: NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                  - name: SERVICE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.labels['rhdh.redhat.com/app']
  application:
    dynamicPluginsConfigMapName: dynamic-plugins
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config-rhdh
    extraFiles:
      mountPath: /opt/app-root/src
    extraEnvs:
      secrets:
        - name: x2a-credentials
    route:
      enabled: true
